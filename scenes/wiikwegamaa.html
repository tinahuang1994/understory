<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wiikwegamaa · Ojibwe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #080a0c;
    color: #f5f0e8;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; width: 100%; height: 100%; }
  .veil {
    position: fixed; inset: 0;
    background: #0d1014;
    pointer-events: none;
    opacity: 1;
    transition: opacity 4.5s cubic-bezier(.4,0,.6,1);
    z-index: 20;
  }
  .veil.lifted { opacity: 0; }
  .veil.closing { opacity: 1; transition: opacity 1.8s ease; }
  .caption {
    position: fixed;
    left: 0; right: 0;
    bottom: 10vh;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3.5s ease;
  }
  .caption.in { opacity: 1; }
  .caption .word {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 56px;
    letter-spacing: 0.08em;
    color: rgba(200, 215, 230, 0.92);
    text-shadow: 0 2px 16px rgba(0,0,0,0.98), 0 0 80px rgba(0,0,0,0.85), 0 4px 6px rgba(0,0,0,1);
  }
  .caption .lang {
    display: block;
    margin-top: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(200, 218, 235, 0.55);
    text-shadow: 0 1px 4px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.95);
  }
  .caption .felt {
    display: block;
    margin-top: 28px;
    max-width: 700px;
    margin-left: auto; margin-right: auto;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 19px;
    line-height: 1.75;
    letter-spacing: 0.02em;
    color: rgba(220, 232, 242, 0.88);
    text-shadow: 0 1px 3px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.98), 0 2px 8px rgba(0,0,0,0.98);
  }
  .exit {
    position: fixed;
    top: 24px; left: 28px;
    z-index: 15;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: rgba(200, 218, 235, 0.40);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.6s ease 1s, color 0.4s ease;
  }
  .exit.ready { opacity: 1; }
  .exit:hover { color: rgba(200, 218, 235, 0.88); }
  @media (prefers-reduced-motion: reduce) {
    .veil, .caption, .exit { transition-duration: 0.4s; }
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div class="caption" id="caption">
    <span class="word">Wiikwegamaa</span>
    <span class="lang">Ojibwe</span>
    <span class="felt">The bay does not simply hold water. In Anishinaabe, the water is your kin —<br>and standing at its edge is not sightseeing. It is visiting.</span>
  </div>
  <button class="exit" id="exit" aria-label="Return to the field">
    <span>←</span><span>return</span>
  </button>
  <div class="veil" id="veil"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(() => {
  // ------------------------------------------------------------------
  //  WIIKWEGAMAA — Ojibwe. The bay. The water as kin.
  //
  //  Layer 0: Photo base — boreal lake at dusk, perfect mirror reflection.
  //  Layer 1: Water shimmer — barely visible trembling at the waterline.
  //  Layer 2: Mist drift — thin wisps across the surface.
  //
  //  Audio fingerprint: LOON CALL — rising-then-falling sine sweep.
  //  No other scene uses this call shape or frequency arc.
  // ------------------------------------------------------------------

  const stageEl   = document.getElementById('stage');
  const captionEl = document.getElementById('caption');
  const exitEl    = document.getElementById('exit');
  const veilEl    = document.getElementById('veil');

  const scene    = new THREE.Scene();
  scene.background = new THREE.Color('#080a0c');
  const camera   = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 0);
  camera.lookAt(0, 0, -1);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  stageEl.appendChild(renderer.domElement);

  const skyGeo = new THREE.PlaneGeometry(2, 2);

  // -------- Layer 0: Photo base --------
  // CENTER_Y = 0.52 — waterline at center, forest reflection below, sky above.
  const bgTex = new THREE.TextureLoader().load('../assets/wiikwegamaa.png');
  const bgMat = new THREE.ShaderMaterial({
    uniforms: {
      uBg:     { value: bgTex },
      uTime:   { value: 0 },
      uAspect: { value: window.innerWidth / window.innerHeight },
    },
    depthTest: false, depthWrite: false,
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.999, 1.0); }`,
    fragmentShader: `
      uniform sampler2D uBg;
      uniform float uTime;
      uniform float uAspect;
      varying vec2 vUv;
      const float IMG_AR   = 0.75;
      const float CENTER_Y = 0.52;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      void main() {
        float visH = IMG_AR / uAspect;
        float yOff = CENTER_Y - visH * 0.5;
        vec2 uv = vec2(vUv.x, vUv.y * visH + yOff);
        vec3 col = texture2D(uBg, clamp(uv, vec2(0.0), vec2(1.0))).rgb;
        float wmX = smoothstep(0.80, 1.0, vUv.x);
        float wmY = smoothstep(0.85, 1.0, vUv.y);
        col *= 1.0 - wmX * wmY * 0.90;
        // Dusk desaturation
        float lum = dot(col, vec3(0.299, 0.587, 0.114));
        col = mix(col, vec3(lum), 0.18);
        // Cool blue in sky
        float skyMask = smoothstep(0.52, 0.22, vUv.y);
        col.b += skyMask * 0.018; col.r -= skyMask * 0.010;
        // Cooler/bluer reflection in water zone
        float waterMask = smoothstep(0.50, 0.68, vUv.y);
        col.b += waterMask * 0.012;
        // Film grain
        float g1 = hash(vUv * 2147.3 + floor(uTime * 12.0) * 0.19);
        float g2 = hash(vUv * 3891.8 + floor(uTime * 12.0) * 0.33 + 0.5);
        float grain = (g1*0.65 + g2*0.35 - 0.5) * 0.024;
        lum = dot(col, vec3(0.299, 0.587, 0.114));
        col += grain * clamp(1.0 - abs(lum - 0.45)*1.5, 0.25, 1.0);
        // Vignette
        float vign = distance(vUv, vec2(0.5, 0.50));
        col *= 1.0 - smoothstep(0.20, 0.88, vign) * 0.52;
        gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
      }
    `,
  });
  scene.add(new THREE.Mesh(skyGeo, bgMat));

  // -------- Layer 1: Water shimmer --------
  const shimmerMat = new THREE.ShaderMaterial({
    transparent: true, depthTest: false, depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p) {
        vec2 i=floor(p), f=fract(p);
        float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
        vec2 u=f*f*(3.0-2.0*f);
        return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
      }
      void main() {
        float band = smoothstep(0.08, 0.0, abs(vUv.y - 0.47));
        float ripple = noise(vec2(vUv.x * 18.0 + uTime * 0.08, uTime * 0.05)) * 0.5 + 0.5;
        float amt = band * ripple * 0.06;
        vec3 col = vec3(0.65, 0.75, 0.90) * amt;
        gl_FragColor = vec4(col, amt * 0.6);
      }
    `,
  });
  const shimmerMesh = new THREE.Mesh(skyGeo, shimmerMat);
  shimmerMesh.renderOrder = 1;
  scene.add(shimmerMesh);

  // -------- Layer 2: Mist drift --------
  const mistMat = new THREE.ShaderMaterial({
    transparent: true, depthTest: false, depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p) {
        vec2 i=floor(p), f=fract(p);
        float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
        vec2 u=f*f*(3.0-2.0*f);
        return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
      }
      float fbm(vec2 p) {
        float v=0.0, a=0.5;
        for (int i=0;i<3;i++) { v+=a*noise(p); p*=2.0; a*=0.5; }
        return v;
      }
      void main() {
        float mistZone = smoothstep(0.68, 0.44, vUv.y) * smoothstep(0.44, 0.56, vUv.y);
        vec2 p = vec2(vUv.x * 3.5 - uTime * 0.009, vUv.y * 2.0);
        float mist = smoothstep(0.42, 0.62, fbm(p));
        float amt = mist * mistZone * 0.09;
        vec3 col = vec3(0.80, 0.86, 0.92) * amt;
        gl_FragColor = vec4(col, amt * 0.5);
      }
    `,
  });
  const mistMesh = new THREE.Mesh(skyGeo, mistMat);
  mistMesh.renderOrder = 2;
  scene.add(mistMesh);

  const clock = new THREE.Clock();

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    bgMat.uniforms.uAspect.value = w / h;
  }
  window.addEventListener('resize', resize);

  function animate() {
    const t = clock.getElapsedTime();
    bgMat.uniforms.uTime.value      = t;
    shimmerMat.uniforms.uTime.value = t;
    mistMat.uniforms.uTime.value    = t;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  // ---------- Scene entry — slowest of all scenes ----------
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setTimeout(() => {
      veilEl.classList.add('lifted');
      setTimeout(() => captionEl.classList.add('in'), 3200);
      setTimeout(() => exitEl.classList.add('ready'), 4800);
    }, 1600);
  }));

  function returnToField() {
    veilEl.classList.remove('lifted');
    veilEl.classList.add('closing');
    captionEl.classList.remove('in');
    sessionStorage.setItem('understory:returning', '1');
    if (window.__wiikwegamaaAudio) window.__wiikwegamaaAudio.fadeOut(1.8);
    setTimeout(() => { location.href = '../'; }, 1800);
  }
  exitEl.addEventListener('click', returnToField);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') returnToField(); });

  // ---------- Audio ----------
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.value = 0;
  master.connect(audioCtx.destination);

  function makeNoise(sec, mul = 1) {
    const buf = audioCtx.createBuffer(1, sec * audioCtx.sampleRate, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0;
    for (let i=0;i<d.length;i++) {
      const w=Math.random()*2-1;
      b0=0.99765*b0+w*0.0990460; b1=0.96300*b1+w*0.2965164; b2=0.57000*b2+w*1.0526913;
      d[i]=(b0+b1+b2+w*0.1848)*0.08*mul;
    }
    return buf;
  }

  // (1) Sub-bass 68 Hz — the mass of still water
  const droneOsc = audioCtx.createOscillator();
  droneOsc.type = 'sine'; droneOsc.frequency.value = 68;
  const droneGain = audioCtx.createGain(); droneGain.gain.value = 0.14;
  const droneLFO = audioCtx.createOscillator(); droneLFO.frequency.value = 0.007;
  const droneLFOAmt = audioCtx.createGain(); droneLFOAmt.gain.value = 0.02;
  droneLFO.connect(droneLFOAmt).connect(droneGain.gain); droneLFO.start();
  droneOsc.connect(droneGain).connect(master); droneOsc.start();

  // (2) Water surface hiss — the skin of still water
  const waterSrc = audioCtx.createBufferSource();
  waterSrc.buffer = makeNoise(7, 0.4); waterSrc.loop = true;
  const waterHP = audioCtx.createBiquadFilter(); waterHP.type = 'highpass'; waterHP.frequency.value = 2800;
  const waterLP = audioCtx.createBiquadFilter(); waterLP.type = 'lowpass'; waterLP.frequency.value = 5500;
  const waterGain = audioCtx.createGain(); waterGain.gain.value = 0.07;
  waterSrc.connect(waterHP).connect(waterLP).connect(waterGain).connect(master);
  waterSrc.start();

  // (3) Loon call — the unique fingerprint
  function loonCall() {
    const now = audioCtx.currentTime;
    const baseFreq = 400 + Math.random() * 40;
    const dur = 1.8 + Math.random() * 0.6;

    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    // Vibrato — loons have a tremolo quality
    const vibOsc = audioCtx.createOscillator(); vibOsc.frequency.value = 5.5;
    const vibAmt = audioCtx.createGain(); vibAmt.gain.value = 12;
    vibOsc.connect(vibAmt).connect(osc.frequency);
    vibOsc.start(now); vibOsc.stop(now + dur + 0.1);
    // Rising arc then fall
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.linearRampToValueAtTime(baseFreq * 1.60, now + dur * 0.45);
    osc.frequency.linearRampToValueAtTime(baseFreq * 0.90, now + dur);

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.12, now + 0.12);
    g.gain.setValueAtTime(0.12, now + dur * 0.55);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    osc.connect(g).connect(master); osc.start(now); osc.stop(now + dur + 0.15);

    // Sometimes an echo call answers from across the lake
    if (Math.random() < 0.30) {
      setTimeout(loonCall, 4500 + Math.random() * 3000);
    } else {
      setTimeout(loonCall, 35000 + Math.random() * 30000);
    }
  }
  setTimeout(loonCall, 12000 + Math.random() * 8000);

  function beginFadeIn() {
    const t0 = audioCtx.currentTime;
    master.gain.cancelScheduledValues(t0);
    master.gain.setValueAtTime(0, t0);
    master.gain.linearRampToValueAtTime(0.50, t0 + 6.0);
  }
  audioCtx.resume().then(beginFadeIn).catch(() => {});
  document.addEventListener('click', () => audioCtx.resume().then(beginFadeIn).catch(() => {}), { once: true });

  window.__wiikwegamaaAudio = {
    fadeOut(sec = 1.8) {
      const n = audioCtx.currentTime;
      master.gain.cancelScheduledValues(n);
      master.gain.setValueAtTime(master.gain.value, n);
      master.gain.linearRampToValueAtTime(0, n + sec);
    }
  };
})();
</script>
</body>
</html>
