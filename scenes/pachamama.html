<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pachamama · Quechua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #050404;
    color: #f5f0e8;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; width: 100%; height: 100%; }
  .veil {
    position: fixed; inset: 0;
    background: #000;
    pointer-events: none;
    opacity: 1;
    transition: opacity 4.5s cubic-bezier(.4,0,.6,1);
    z-index: 20;
  }
  .veil.lifted { opacity: 0; }
  .veil.closing { opacity: 1; transition: opacity 1.8s ease; }
  .caption {
    position: fixed;
    left: 0; right: 0;
    bottom: 10vh;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3.5s ease;
  }
  .caption.in { opacity: 1; }
  .caption .word {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 56px;
    letter-spacing: 0.08em;
    color: #e8c97a;
    text-shadow: 0 2px 16px rgba(0,0,0,0.95), 0 0 80px rgba(0,0,0,0.80), 0 4px 6px rgba(0,0,0,1);
  }
  .caption .lang {
    display: block;
    margin-top: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(245, 236, 210, 0.65);
    text-shadow: 0 1px 4px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.95);
  }
  .caption .felt {
    display: block;
    margin-top: 28px;
    max-width: 700px;
    margin-left: auto; margin-right: auto;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 19px;
    line-height: 1.75;
    letter-spacing: 0.02em;
    color: rgba(245, 238, 220, 0.92);
    text-shadow: 0 1px 3px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.98), 0 2px 8px rgba(0,0,0,0.98);
  }
  .exit {
    position: fixed;
    top: 24px; left: 28px;
    z-index: 15;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: rgba(245, 236, 210, 0.45);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.6s ease 1s, color 0.4s ease;
  }
  .exit.ready { opacity: 1; }
  .exit:hover { color: rgba(245, 236, 210, 0.90); }
  @media (prefers-reduced-motion: reduce) {
    .veil, .caption, .exit { transition-duration: 0.4s; }
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div class="caption" id="caption">
    <span class="word">Pachamama</span>
    <span class="lang">Quechua</span>
    <span class="felt">In Quechua, the word for earth and the word for time are the same.<br>Pachamama is not where things happen. She is when they happen too.</span>
  </div>
  <button class="exit" id="exit" aria-label="Return to the field">
    <span>←</span><span>return</span>
  </button>
  <div class="veil" id="veil"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(() => {
  // ------------------------------------------------------------------
  //  PACHAMAMA — Quechua. Earth and time are the same word.
  //
  //  Layer 0: Photo base — ancient Andean stone terracing at twilight.
  //           Red-ochre earth, cool blue sky, mountain valley.
  //  Layer 1: Stone glow — remnant heat of day held in ancient rock.
  //  Layer 2: Mountain haze — atmospheric blue settling in the valley.
  //
  //  Audio fingerprint: STONE RESONANCE — 950 Hz BP, narrow Q.
  //  Wind finding gaps between ancient stones. Unused in any other scene.
  // ------------------------------------------------------------------

  const stageEl   = document.getElementById('stage');
  const captionEl = document.getElementById('caption');
  const exitEl    = document.getElementById('exit');
  const veilEl    = document.getElementById('veil');

  const scene    = new THREE.Scene();
  scene.background = new THREE.Color('#050404');
  const camera   = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 0);
  camera.lookAt(0, 0, -1);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  stageEl.appendChild(renderer.domElement);

  const skyGeo = new THREE.PlaneGeometry(2, 2);

  // -------- Layer 0: Photo base --------
  // CENTER_Y = 0.52 — centers the stone terracing in frame; valley recedes below.
  const bgTex = new THREE.TextureLoader().load('../assets/pachamama.jpg');
  const bgMat = new THREE.ShaderMaterial({
    uniforms: {
      uBg:     { value: bgTex },
      uTime:   { value: 0 },
      uAspect: { value: window.innerWidth / window.innerHeight },
    },
    depthTest: false, depthWrite: false,
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.999, 1.0); }`,
    fragmentShader: `
      uniform sampler2D uBg;
      uniform float uTime;
      uniform float uAspect;
      varying vec2 vUv;
      const float IMG_AR   = 0.75;
      const float CENTER_Y = 0.52;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      void main() {
        float visH = IMG_AR / uAspect;
        float yOff = CENTER_Y - visH * 0.5;
        vec2 uv = vec2(vUv.x, vUv.y * visH + yOff);
        vec3 col = texture2D(uBg, clamp(uv, vec2(0.0), vec2(1.0))).rgb;
        float wmX = smoothstep(0.80, 1.0, vUv.x);
        float wmY = smoothstep(0.85, 1.0, vUv.y);
        col *= 1.0 - wmX * wmY * 0.90;
        // Deepen red-ochre earth in foreground terracing
        float earthMask = smoothstep(0.38, 0.68, vUv.y);
        col.r += earthMask * 0.018; col.g -= earthMask * 0.004;
        // Subtle sky push — photo has its own strong twilight blue, don't over-cool it
        float skyMask = smoothstep(0.38, 0.08, vUv.y);
        float lum = dot(col, vec3(0.299, 0.587, 0.114));
        col = mix(col, vec3(lum*0.85+0.01, lum*0.85+0.02, lum*0.85+0.08), skyMask * 0.15);
        // Film grain
        float g1 = hash(vUv * 2031.7 + floor(uTime * 12.0) * 0.23);
        float g2 = hash(vUv * 3714.5 + floor(uTime * 12.0) * 0.31 + 0.5);
        float grain = (g1*0.65 + g2*0.35 - 0.5) * 0.028;
        lum = dot(col, vec3(0.299, 0.587, 0.114));
        col += grain * clamp(1.0 - abs(lum - 0.45)*1.5, 0.25, 1.0);
        // Vignette
        float vign = distance(vUv, vec2(0.5, 0.50));
        col *= 1.0 - smoothstep(0.20, 0.90, vign) * 0.52;
        gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
      }
    `,
  });
  scene.add(new THREE.Mesh(skyGeo, bgMat));

  const clock = new THREE.Clock();

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    bgMat.uniforms.uAspect.value = w / h;
  }
  window.addEventListener('resize', resize);

  function animate() {
    const t = clock.getElapsedTime();
    bgMat.uniforms.uTime.value = t;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  // ---------- Scene entry ----------
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setTimeout(() => {
      veilEl.classList.add('lifted');
      setTimeout(() => captionEl.classList.add('in'), 3000);
      setTimeout(() => exitEl.classList.add('ready'), 4500);
    }, 1500);
  }));

  function returnToField() {
    veilEl.classList.remove('lifted');
    veilEl.classList.add('closing');
    captionEl.classList.remove('in');
    sessionStorage.setItem('understory:returning', '1');
    if (window.__pachamamaAudio) window.__pachamamaAudio.fadeOut(1.8);
    setTimeout(() => { location.href = '../'; }, 1800);
  }
  exitEl.addEventListener('click', returnToField);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') returnToField(); });

  // ---------- Audio ----------
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.value = 0;
  master.connect(audioCtx.destination);

  function makeNoise(sec, mul = 1) {
    const buf = audioCtx.createBuffer(1, sec * audioCtx.sampleRate, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0;
    for (let i=0;i<d.length;i++) {
      const w=Math.random()*2-1;
      b0=0.99765*b0+w*0.0990460; b1=0.96300*b1+w*0.2965164; b2=0.57000*b2+w*1.0526913;
      d[i]=(b0+b1+b2+w*0.1848)*0.08*mul;
    }
    return buf;
  }

  // (1) Sub-bass 62 Hz — Andean bedrock, ancient
  const droneOsc = audioCtx.createOscillator();
  droneOsc.type = 'sine'; droneOsc.frequency.value = 62;
  const droneGain = audioCtx.createGain(); droneGain.gain.value = 0.16;
  const droneLFO = audioCtx.createOscillator(); droneLFO.frequency.value = 0.008;
  const droneLFOAmt = audioCtx.createGain(); droneLFOAmt.gain.value = 0.025;
  droneLFO.connect(droneLFOAmt).connect(droneGain.gain); droneLFO.start();
  droneOsc.connect(droneGain).connect(master); droneOsc.start();

  // (2) Mountain weight — 140 Hz LP, deep tectonic rumble. Nothing else uses this.
  const windSrc = audioCtx.createBufferSource();
  windSrc.buffer = makeNoise(7, 1.4); windSrc.loop = true;
  const windLP = audioCtx.createBiquadFilter(); windLP.type = 'lowpass'; windLP.frequency.value = 140;
  const windGain = audioCtx.createGain(); windGain.gain.value = 0.18;
  const windLFO = audioCtx.createOscillator(); windLFO.frequency.value = 0.016;
  const windLFOAmt = audioCtx.createGain(); windLFOAmt.gain.value = 0.08;
  windLFO.connect(windLFOAmt).connect(windGain.gain); windLFO.start();
  const windSweep = audioCtx.createOscillator(); windSweep.frequency.value = 0.011;
  const windSweepAmt = audioCtx.createGain(); windSweepAmt.gain.value = 55;
  windSweep.connect(windSweepAmt).connect(windLP.frequency); windSweep.start();
  windSrc.connect(windLP).connect(windGain).connect(master); windSrc.start();

  // (3) Stone resonance — 950 Hz BP, narrow Q — the fingerprint
  // Wind finding gaps between ancient stone terracing walls.
  const stoneSrc = audioCtx.createBufferSource();
  stoneSrc.buffer = makeNoise(5, 0.7); stoneSrc.loop = true;
  const stoneBP = audioCtx.createBiquadFilter(); stoneBP.type = 'bandpass'; stoneBP.frequency.value = 950; stoneBP.Q.value = 4.5;
  const stoneGain = audioCtx.createGain(); stoneGain.gain.value = 0.22;
  const stoneLFO = audioCtx.createOscillator(); stoneLFO.frequency.value = 0.035;
  const stoneLFOAmt = audioCtx.createGain(); stoneLFOAmt.gain.value = 0.05;
  stoneLFO.connect(stoneLFOAmt).connect(stoneGain.gain); stoneLFO.start();
  stoneSrc.connect(stoneBP).connect(stoneGain).connect(master); stoneSrc.start();

  // (4) Mountain echo — rare deep valley resonance, every 50–80s
  function mountainEcho() {
    const now = audioCtx.currentTime;
    const dur  = 3.0 + Math.random() * 2.0;
    const freq = 120 + Math.random() * 60;
    const noise = audioCtx.createBufferSource();
    noise.buffer = makeNoise(dur + 1, 1.5);
    const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = freq + 30;
    const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = freq - 20;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18, now + 0.6);
    g.gain.setValueAtTime(0.18, now + dur * 0.3);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    noise.connect(lp).connect(hp).connect(g).connect(master);
    noise.start(now); noise.stop(now + dur + 0.1);
    setTimeout(mountainEcho, 50000 + Math.random() * 30000);
  }
  setTimeout(mountainEcho, 20000 + Math.random() * 15000);

  function beginFadeIn() {
    const t0 = audioCtx.currentTime;
    master.gain.cancelScheduledValues(t0);
    master.gain.setValueAtTime(0, t0);
    master.gain.linearRampToValueAtTime(0.58, t0 + 5.5);
  }
  audioCtx.resume().then(beginFadeIn).catch(() => {});
  document.addEventListener('click', () => audioCtx.resume().then(beginFadeIn).catch(() => {}), { once: true });

  window.__pachamamaAudio = {
    fadeOut(sec = 1.8) {
      const n = audioCtx.currentTime;
      master.gain.cancelScheduledValues(n);
      master.gain.setValueAtTime(master.gain.value, n);
      master.gain.linearRampToValueAtTime(0, n + sec);
    }
  };
})();
</script>
</body>
</html>
