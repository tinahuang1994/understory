<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Тоска · Toska</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=PT+Serif:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #060606;
    color: #f5f0e8;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; width: 100%; height: 100%; }

  .veil {
    position: fixed; inset: 0;
    background: #000;
    pointer-events: none;
    opacity: 1;
    transition: opacity 4.5s cubic-bezier(.4,0,.6,1);
    z-index: 20;
  }
  .veil.lifted { opacity: 0; }
  .veil.closing { opacity: 1; transition: opacity 1.8s ease; }

  .caption {
    position: fixed;
    left: 0; right: 0;
    bottom: 10vh;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 4s ease;
  }
  .caption.in { opacity: 1; }

  /* Cyrillic — PT Serif handles the script beautifully */
  /* Cold off-white, not amber — Toska doesn't announce itself */
  .caption .script {
    display: block;
    font-family: 'PT Serif', serif;
    font-weight: 400;
    font-size: 56px;
    letter-spacing: 0.10em;
    color: rgba(220, 215, 205, 0.94);
    text-shadow:
      0 2px 16px rgba(0,0,0,0.98),
      0 0 60px rgba(0,0,0,0.80),
      0 4px 6px rgba(0,0,0,1);
  }

  .caption .roman {
    display: block;
    margin-top: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 0.12em;
    color: rgba(220, 215, 205, 0.88);
    text-shadow: 0 1px 3px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.95);
  }

  .caption .felt {
    display: block;
    margin-top: 28px;
    max-width: 700px;
    margin-left: auto; margin-right: auto;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 19px;
    line-height: 1.7;
    letter-spacing: 0.02em;
    color: rgba(220, 215, 205, 0.90);
    text-shadow: 0 1px 3px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.98), 0 2px 8px rgba(0,0,0,0.98);
  }

  .exit {
    position: fixed;
    top: 24px; left: 28px;
    z-index: 15;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: rgba(220, 215, 205, 0.45);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.6s ease 1s, color 0.4s ease;
  }
  .exit.ready { opacity: 1; }
  .exit:hover { color: rgba(220, 215, 205, 0.90); }

  @media (prefers-reduced-motion: reduce) {
    .veil, .caption, .exit { transition-duration: 0.4s; }
  }
</style>
</head>
<body>
  <div id="stage"></div>

  <div class="caption" id="caption">
    <span class="script">Тоска</span>
    <span class="roman">Toska · Russian</span>
    <span class="felt">A longing with nothing to long for. The ache that has no address.</span>
  </div>

  <button class="exit" id="exit" aria-label="Return to the field">
    <span>←</span><span>return</span>
  </button>

  <div class="veil" id="veil"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(() => {
  // ------------------------------------------------------------------
  //  ТОСКА / TOSKA — longing without an object
  //
  //  Visual composition:
  //    • Bare birch trees in a Russian winter field. No sun. No color.
  //      The branches are the whole composition — skeletal, intricate,
  //      against a flat grey-white sky.
  //    • No wind. No movement except the quiet fall of snow — fine,
  //      sparse, straight down. The kind of snowfall that isn't a storm,
  //      just the world continuing its grey work.
  //    • The scene does not glow. There is no warm light source.
  //      Only the flat diffuse light of an overcast Russian January.
  //    • The weight is in the stillness. Nothing happens. Nothing is
  //      about to happen. That is the point.
  // ------------------------------------------------------------------

  const stageEl   = document.getElementById('stage');
  const captionEl = document.getElementById('caption');
  const exitEl    = document.getElementById('exit');
  const veilEl    = document.getElementById('veil');

  const scene    = new THREE.Scene();
  scene.background = new THREE.Color('#060606');

  const camera   = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 0);
  camera.lookAt(0, 0, -1);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  stageEl.appendChild(renderer.domElement);

  const skyGeo = new THREE.PlaneGeometry(2, 2);

  // -------- Layer 0: Photo base --------
  // Portrait image, ~0.75 AR.
  // CENTER_Y = 0.42 — leans into the grey sky and upper branches.
  // The most atmospheric part of the image: where bare branches
  // dissolve into flat white-grey sky.
  const bgLoader = new THREE.TextureLoader();
  const bgTex    = bgLoader.load('../assets/toska.png');

  const bgMat = new THREE.ShaderMaterial({
    uniforms: {
      uBg:     { value: bgTex },
      uTime:   { value: 0 },
      uAspect: { value: window.innerWidth / window.innerHeight },
    },
    depthTest: false,
    depthWrite: false,
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.999, 1.0); }
    `,
    fragmentShader: `
      uniform sampler2D uBg;
      uniform float uTime;
      uniform float uAspect;
      varying vec2 vUv;

      const float IMG_AR   = 0.75;
      const float CENTER_Y = 0.42;

      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }

      void main() {
        float visH = IMG_AR / uAspect;
        float yOff = CENTER_Y - visH * 0.5;
        vec2 uv = vec2(vUv.x, vUv.y * visH + yOff);
        vec3 col = texture2D(uBg, clamp(uv, vec2(0.0), vec2(1.0))).rgb;

        // Darken Gemini watermark (bottom-right corner)
        float wmX = smoothstep(0.78, 1.0, vUv.x);
        float wmY = smoothstep(0.84, 1.0, vUv.y);
        col *= 1.0 - wmX * wmY * 0.90;

        // Full desaturation — toska has no color
        float lum = dot(col, vec3(0.299, 0.587, 0.114));
        col = mix(col, vec3(lum), 0.85);

        // Push slightly cooler — Russian winter light is blue-grey, not warm grey
        col.b *= 1.04;
        col.r *= 0.96;

        // Darken midtones slightly — the weight of the sky
        col = pow(col, vec3(1.10));

        // Film grain
        float grain1 = hash(vUv * 1923.7 + floor(uTime * 12.0) * 0.19);
        float grain2 = hash(vUv * 3614.2 + floor(uTime * 12.0) * 0.33 + 0.5);
        float grain  = (grain1 * 0.65 + grain2 * 0.35 - 0.5) * 0.030;
        float midMask = 1.0 - abs(lum - 0.50) * 1.6;
        col += grain * clamp(midMask, 0.25, 1.0);

        // Heavy vignette — Toska closes in. No open edges.
        float vign = distance(vUv, vec2(0.5, 0.46));
        col *= 1.0 - smoothstep(0.18, 0.88, vign) * 0.68;

        gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
      }
    `,
  });
  const bgMesh = new THREE.Mesh(skyGeo, bgMat);
  scene.add(bgMesh);

  // -------- Layer 1: Sky weight --------
  // A barely-perceptible darkening from the top — the sky pressing down.
  // Not a glow. The opposite: a slight heaviness in the upper frame.
  // Pulse so slow it reads as the light shifting between clouds.
  const skyWeightMat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    blending: THREE.NormalBlending,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;

      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
      }

      void main() {
        // Very slow cloud-cover modulation — light dims as overcast thickens
        float cover = noise(vec2(uTime * 0.008, 0.3)) * 0.5 + 0.5;
        float topWeight = smoothstep(0.5, 0.0, vUv.y) * (0.10 + 0.08 * cover);
        // Dark, not colored — pure grey shadow
        gl_FragColor = vec4(vec3(0.0), topWeight);
      }
    `,
  });
  const skyWeightMesh = new THREE.Mesh(skyGeo, skyWeightMat);
  skyWeightMesh.renderOrder = 1;
  scene.add(skyWeightMesh);

  // Snow removed. The birch trees already stand in it.
  // Toska is about nothing happening — not even weather events.
  // The stillness is the point.

  const clock = new THREE.Clock();

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    bgMat.uniforms.uAspect.value = w / h;
  }
  window.addEventListener('resize', resize);

  function animate() {
    const t = clock.getElapsedTime();
    bgMat.uniforms.uTime.value        = t;
    skyWeightMat.uniforms.uTime.value = t;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  // ---------- Scene entry ----------
  // Slowest veil lift of any scene — the darkness doesn't want to let go.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setTimeout(() => {
      veilEl.classList.add('lifted');
      setTimeout(() => captionEl.classList.add('in'), 3200);
      setTimeout(() => exitEl.classList.add('ready'), 5000);
    }, 1600);
  }));

  function returnToField() {
    veilEl.classList.remove('lifted');
    veilEl.classList.add('closing');
    captionEl.classList.remove('in');
    sessionStorage.setItem('understory:returning', '1');
    if (window.__toskaAudio) window.__toskaAudio.fadeOut(1.8);
    setTimeout(() => { location.href = '../'; }, 1800);
  }
  exitEl.addEventListener('click', returnToField);
  window.addEventListener('keydown', (e) => { if (e.key === 'Escape') returnToField(); });

  // ---------- Sound: Toska — a sustained ache ----------
  //
  // (1) String tone — triangle wave at 220 Hz (A3), filtered and trembling.
  //     Sounds like a single cello note held in an empty room.
  //     Clearly audible on any speakers. The continuous ache.
  // (2) Cold room hiss — very narrow BP around 600 Hz, near-silent.
  //     The acoustic texture of an unheated room in winter.
  //     Just enough to give the space a body.
  // (3) Crow — every 20–35 seconds. Two calls, then silence.
  //     The silence after is heavier than before.

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.value = 0;
  master.connect(audioCtx.destination);

  function makeNoise(seconds, gainMul = 1) {
    const len = seconds * audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0;
    for (let i=0;i<len;i++) {
      const w = Math.random()*2-1;
      b0 = 0.99765*b0 + w*0.0990460;
      b1 = 0.96300*b1 + w*0.2965164;
      b2 = 0.57000*b2 + w*1.0526913;
      d[i] = (b0+b1+b2 + w*0.1848) * 0.08 * gainMul;
    }
    return buf;
  }

  // (1) String tone — triangle wave, lowpass filtered, slow tremolo.
  const strOsc = audioCtx.createOscillator();
  strOsc.type = 'triangle';
  strOsc.frequency.value = 220;
  const strLP = audioCtx.createBiquadFilter();
  strLP.type = 'lowpass';
  strLP.frequency.value = 900;
  strLP.Q.value = 0.5;
  const strGain = audioCtx.createGain();
  strGain.gain.value = 0.22;
  // Very slow tremolo — the bow barely moving, sustaining
  const tremoloLFO = audioCtx.createOscillator();
  tremoloLFO.frequency.value = 0.28;
  const tremoloAmt = audioCtx.createGain();
  tremoloAmt.gain.value = 0.04;
  tremoloLFO.connect(tremoloAmt).connect(strGain.gain);
  tremoloLFO.start();
  strOsc.connect(strLP).connect(strGain).connect(master);
  strOsc.start();

  // Add a quiet fifth (330 Hz) — makes the tone feel like two strings
  // resonating together, slightly out of the same world.
  const fifthOsc = audioCtx.createOscillator();
  fifthOsc.type = 'triangle';
  fifthOsc.frequency.value = 330;
  const fifthLP = audioCtx.createBiquadFilter();
  fifthLP.type = 'lowpass';
  fifthLP.frequency.value = 700;
  const fifthGain = audioCtx.createGain();
  fifthGain.gain.value = 0.09;
  fifthOsc.connect(fifthLP).connect(fifthGain).connect(master);
  fifthOsc.start();

  // (2) Cold room hiss — 600 Hz BP, very quiet.
  const roomSrc = audioCtx.createBufferSource();
  roomSrc.buffer = makeNoise(5, 0.4);
  roomSrc.loop = true;
  const roomBP = audioCtx.createBiquadFilter();
  roomBP.type = 'bandpass';
  roomBP.frequency.value = 600;
  roomBP.Q.value = 2.5;
  const roomGain = audioCtx.createGain();
  roomGain.gain.value = 0.06;
  roomSrc.connect(roomBP).connect(roomGain).connect(master);
  roomSrc.start();

  // (3) Crow — every 20–35 seconds. Two calls, staggered.
  function crow() {
    const now = audioCtx.currentTime;
    [0, 0.55 + Math.random() * 0.3].forEach(offset => {
      const noise = audioCtx.createBufferSource();
      noise.buffer = makeNoise(0.5, 0.8);
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 520 + Math.random() * 120;
      bp.Q.value = 3.5;
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 900;
      const g = audioCtx.createGain();
      const t = now + offset;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.28, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
      noise.connect(bp).connect(lp).connect(g).connect(master);
      noise.start(t);
      noise.stop(t + 0.6);
    });
    setTimeout(crow, 20000 + Math.random() * 15000);
  }
  setTimeout(crow, 5000 + Math.random() * 4000);

  // Fade in — chained directly off resume().then() so currentTime
  // is always read after the context is actually running.
  function beginFadeIn() {
    const t0 = audioCtx.currentTime;
    master.gain.cancelScheduledValues(t0);
    master.gain.setValueAtTime(0, t0);
    master.gain.linearRampToValueAtTime(0.65, t0 + 5.0);
  }
  audioCtx.resume().then(beginFadeIn).catch(() => {});
  document.addEventListener('click', () => {
    audioCtx.resume().then(beginFadeIn).catch(() => {});
  }, { once: true });
  // Fallback: resume on first click if still suspended
  document.addEventListener('click', () => {
    if (audioCtx.state !== 'running') audioCtx.resume();
  }, { once: true });

  window.__toskaAudio = {
    fadeOut(sec = 1.8) {
      const n = audioCtx.currentTime;
      master.gain.cancelScheduledValues(n);
      master.gain.setValueAtTime(master.gain.value, n);
      master.gain.linearRampToValueAtTime(0, n + sec);
    }
  };

})();
</script>
</body>
</html>
