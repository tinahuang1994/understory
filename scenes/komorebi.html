<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>木漏れ日 · Komorebi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@300;400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #050604;
    color: #f5f0e8;
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Three.js canvas full-bleed */
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; width: 100%; height: 100%; }

  /* Enter/exit overlay — fades the whole scene from / to black */
  .veil {
    position: fixed; inset: 0;
    background: #000;
    pointer-events: none;
    opacity: 1;
    transition: opacity 3.8s cubic-bezier(.4,0,.6,1);
    z-index: 20;
  }
  .veil.lifted { opacity: 0; }
  .veil.closing { opacity: 1; transition: opacity 1.8s ease; }

  /* Word caption — lower third, the only text in the scene */
  .caption {
    position: fixed;
    left: 0; right: 0;
    bottom: 10vh;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s ease;
  }
  .caption.in { opacity: 1; }
  .caption .script {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 56px;
    letter-spacing: 0.06em;
    color: #e8c97a;
    text-shadow: 0 2px 12px rgba(0,0,0,0.90), 0 0 60px rgba(0,0,0,0.70);
  }
  .caption .roman {
    display: block;
    margin-top: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 0.12em;
    color: rgba(255, 250, 238, 0.92);
    text-shadow: 0 1px 3px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.95), 0 2px 8px rgba(0,0,0,0.95);
  }
  .caption .felt {
    display: block;
    margin-top: 28px;
    max-width: 820px;
    margin-left: auto; margin-right: auto;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 19px;
    line-height: 1.7;
    letter-spacing: 0.02em;
    color: rgba(255, 250, 238, 0.92);
    text-shadow: 0 1px 3px rgba(0,0,0,1), 0 0 16px rgba(0,0,0,0.95), 0 2px 8px rgba(0,0,0,0.95);
  }

  /* Barely-visible exit — top-left back arrow */
  .exit {
    position: fixed;
    top: 24px; left: 28px;
    z-index: 15;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: rgba(245, 236, 216, 0.55);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.6s ease 1s, color 0.4s ease;
  }
  .exit.ready { opacity: 1; }
  .exit:hover { color: rgba(245, 236, 216, 0.95); }

  @media (prefers-reduced-motion: reduce) {
    .veil, .caption, .exit { transition-duration: 0.4s; }
  }
</style>
</head>
<body>
  <div id="stage"></div>

  <div class="caption" id="caption">
    <div>
      <span class="script">木漏れ日</span>
    </div>
    <span class="roman">Komorebi</span>
    <span class="felt">The way sunlight breaks through leaves — as if the forest is trying to reach you.</span>
  </div>

  <button class="exit" id="exit" aria-label="Return to the field">
    <span>←</span><span>return</span>
  </button>

  <div class="veil" id="veil"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(() => {
  // ------------------------------------------------------------------
  //  KOMOREBI — light filtered through leaves
  //
  //  Visual composition:
  //    • The camera points upward, slightly off-axis. You are *inside*
  //      a forest looking up.
  //    • A dark canopy silhouette fills most of the frame — an organic
  //      noise-carved mask that breathes in the wind.
  //    • God rays (volumetric light shafts) pour down through the holes
  //      in the canopy. Their angle and strength modulate slowly.
  //    • Motes of dust drift in the light, catching it where it passes.
  //    • A very soft warm ground-glow from below, as if the forest floor
  //      is catching the same light.
  // ------------------------------------------------------------------

  const stageEl = document.getElementById('stage');
  const captionEl = document.getElementById('caption');
  const exitEl = document.getElementById('exit');
  const veilEl = document.getElementById('veil');

  const scene    = new THREE.Scene();
  scene.background = new THREE.Color('#050604');

  const camera   = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 0);
  camera.lookAt(0, 1, -1); // looking up and slightly forward

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  stageEl.appendChild(renderer.domElement);

  const skyGeo = new THREE.PlaneGeometry(2, 2);

  // -------- Base: your photo, UV-displaced so leaves sway --------
  const bgLoader = new THREE.TextureLoader();
  const bgTex = bgLoader.load('../assets/komorebi.jpg');

  const bgMat = new THREE.ShaderMaterial({
    uniforms: {
      uBg:     { value: bgTex },
      uTime:   { value: 0 },
      uAspect: { value: window.innerWidth / window.innerHeight },
    },
    depthTest: false,
    depthWrite: false,
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.999, 1.0); }
    `,
    fragmentShader: `
      uniform sampler2D uBg;
      uniform float uTime;
      uniform float uAspect;
      varying vec2 vUv;
      const float IMG_AR   = 0.750;
      const float CENTER_Y = 0.73;   // upper portion: lime-green leaves + sky gaps

      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
        vec2 u = f*f*(3.0-2.0*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
      }

      void main() {
        float visH = IMG_AR / uAspect;
        float yOff = CENTER_Y - visH * 0.5;
        vec2 uv = vec2(vUv.x, vUv.y * visH + yOff);
        // Static photo — no displacement
        vec3 col = texture2D(uBg, clamp(uv, vec2(0.0), vec2(1.0))).rgb;
        float vign = distance(vUv, vec2(0.5));
        col *= 1.0 - smoothstep(0.30, 0.90, vign) * 0.40;
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
  const bgMesh = new THREE.Mesh(skyGeo, bgMat);
  scene.add(bgMesh);

  // -------- Glow: soft breathing halo at the sun position in the photo --------
  const glowMat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;

      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
        vec2 u = f*f*(3.0-2.0*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
      }

      void main() {
        float t = uTime;
        // _126 has no direct sun — light comes through distributed sky gaps.
        // Two soft glows: one for main gap (upper centre-right), one for left gap.
        // Their brightness varies with gust noise so as "leaves shift", light changes.
        float gust = noise(vec2(t * 0.10, 0.5));  // same gust as bgMat

        vec2 g1 = vec2(0.58 + sin(t*0.08)*0.015, 0.70 + cos(t*0.07)*0.012);
        vec2 g2 = vec2(0.28 + sin(t*0.06)*0.012, 0.65 + cos(t*0.09)*0.010);

        float d1 = distance(vUv, g1);
        float d2 = distance(vUv, g2);

        // Wide soft glows — no hard bright core
        float a1 = smoothstep(0.42, 0.0, d1) * (0.50 + 0.50 * gust);
        float a2 = smoothstep(0.35, 0.0, d2) * (0.35 + 0.40 * noise(vec2(t*0.09, 1.0)));

        float amt = a1 * 0.32 + a2 * 0.22;
        vec3 col = vec3(0.92, 0.97, 1.00) * amt;
        gl_FragColor = vec4(col, amt * 0.80);
      }
    `,
  });
  const glowMesh = new THREE.Mesh(skyGeo, glowMat);
  glowMesh.renderOrder = 1;
  scene.add(glowMesh);

  // -------- Rays: subtle beams from the sun, each breathing independently --------
  const raysMat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime:   { value: 0 },
      uAspect: { value: window.innerWidth / window.innerHeight },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform float uAspect;
      varying vec2 vUv;

      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
      }

      void main() {
        float t = uTime;
        // Same gust noise as bgMat + glowMat — this is the coupling:
        // as leaves sway (gust), the light source shifts, making rays feel live.
        float gust = noise(vec2(t * 0.10, 0.5));
        float gustX = (noise(vec2(t * 0.10, 1.5)) - 0.5) * 0.025;
        float gustY = (noise(vec2(t * 0.10, 2.5)) - 0.5) * 0.015;

        // Centre between the two sky gaps in _126, nudged by gust
        vec2 sun = vec2(0.46 + gustX, 0.68 + gustY);
        vec2 dir = vUv - sun;
        float dist = length(dir);
        float ang  = atan(dir.y, dir.x);

        float b1 = noise(vec2(ang * 3.5 + t * 0.022, 0.5));
        b1 = pow(b1, 2.5);
        // Breathing modulated by the same gust — light dims when "leaves close"
        b1 *= (0.35 + 0.65 * gust) * (0.50 + 0.50 * sin(t * 0.15 + ang * 2.0));

        float b2 = noise(vec2(ang * 9.0 - t * 0.018, 2.8));
        b2 = pow(b2, 5.0) * gust;

        float amt = (b1 * 0.55 + b2 * 0.45)
                  * smoothstep(0.85, 0.03, dist)
                  * smoothstep(0.01, 0.055, dist);

        vec3 col = vec3(0.95, 0.90, 0.70) * amt * 0.45;
        gl_FragColor = vec4(col, amt * 0.62);
      }
    `,
  });
  const raysMesh = new THREE.Mesh(skyGeo, raysMat);
  raysMesh.renderOrder = 2;
  scene.add(raysMesh);

  // -------- Light shafts — directional beams piercing down from sky gaps --------
  // Three narrow beams originating from the blue-sky gaps visible in photo _126.
  // They are essentially static — only a very slow opacity breath (period ~80s)
  // simulates the faint shift of light through settling leaves. No position movement.
  const beamsMat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime:   { value: 0 },
      uAspect: { value: window.innerWidth / window.innerHeight },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform float uAspect;
      varying vec2 vUv;

      // Physically-plausible light shaft.
      // Cross-section is a Gaussian (bell curve) — no hard edge anywhere.
      // Axial profile: soft entry at the gap, then power-law decay toward the bottom,
      // the way light attenuates through air with suspended dust.
      // sig: Gaussian sigma (controls beam width — wider = softer/bigger)
      // len: how far down the beam travels
      float shaft(vec2 uv, vec2 orig, vec2 dir, float sig, float len) {
        vec2 uvC   = vec2(uv.x * uAspect, uv.y);
        vec2 origC = vec2(orig.x * uAspect, orig.y);
        vec2 d     = uvC - origC;
        float along = dot(d, dir);
        float perp  = dot(d, vec2(-dir.y, dir.x));

        // Reject anything behind the origin or past the end
        if (along < 0.0 || along > len) return 0.0;

        // Gaussian cross-section — no visible edge, just smooth falloff
        float normPerp = perp / sig;
        float cross_   = exp(-normPerp * normPerp * 2.2);

        // Axial: ease in over the first 'sig' of travel (gap exit is soft),
        // then decay naturally — beam is dim by the time it hits the mid-frame.
        float entry  = smoothstep(0.0, sig * 3.0, along);
        float decay  = pow(max(0.0, 1.0 - along / len), 0.55);

        return cross_ * entry * decay;
      }

      void main() {
        float t = uTime;

        // Imperceptibly slow breathing — ~70-90 s period.
        // Feels like the light shifted between glances, not like animation.
        float b1 = 0.80 + 0.20 * sin(t * 0.072);
        float b2 = 0.85 + 0.15 * sin(t * 0.051 + 1.8);
        float b3 = 0.72 + 0.28 * sin(t * 0.063 + 3.4);

        // Directions in aspect-corrected space (so beams aren't squeezed on wide screens)
        vec2 dir1 = normalize(vec2( 0.09 * uAspect, -1.0));  // main shaft, slight right lean
        vec2 dir2 = normalize(vec2(-0.06 * uAspect, -1.0));  // left gap shaft, slight left
        vec2 dir3 = normalize(vec2( 0.18 * uAspect, -1.0));  // narrow accent shaft

        // Wider sigma = softer, more diffuse beam. Narrower = crisper shaft.
        float s1 = shaft(vUv, vec2(0.60, 0.90), dir1, 0.030, 0.78) * b1;
        float s2 = shaft(vUv, vec2(0.27, 0.85), dir2, 0.022, 0.62) * b2;
        float s3 = shaft(vUv, vec2(0.51, 0.93), dir3, 0.013, 0.44) * b3;

        // Weight them — main shaft brightest, accent thinnest
        float acc = min(s1 * 0.58 + s2 * 0.40 + s3 * 0.25, 1.0);
        vec3 col  = vec3(1.00, 0.97, 0.84) * acc;
        gl_FragColor = vec4(col, acc * 0.72);
      }
    `,
  });
  const beamsMesh = new THREE.Mesh(skyGeo, beamsMat);
  beamsMesh.renderOrder = 2;
  scene.add(beamsMesh);

  // -------- Dust motes — small sprites drifting in the light --------
  const MOTE_COUNT = 120;
  const moteGeo = new THREE.BufferGeometry();
  const motePos = new Float32Array(MOTE_COUNT * 3);
  const moteSeed = new Float32Array(MOTE_COUNT);
  for (let i = 0; i < MOTE_COUNT; i++) {
    motePos[i*3 + 0] = (Math.random() - 0.5) * 12;
    motePos[i*3 + 1] = (Math.random() - 0.2) * 8;
    motePos[i*3 + 2] = -2 - Math.random() * 6;
    moteSeed[i] = Math.random() * 1000;
  }
  moteGeo.setAttribute('position', new THREE.BufferAttribute(motePos, 3));
  moteGeo.setAttribute('aSeed',    new THREE.BufferAttribute(moteSeed, 1));

  const moteMat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uPixel: { value: window.innerHeight },
    },
    vertexShader: `
      uniform float uTime;
      uniform float uPixel;
      attribute float aSeed;
      varying float vAlpha;
      void main() {
        vec3 p = position;
        // Slow drift in a gentle upward curl
        p.x += sin(uTime*0.3 + aSeed) * 0.25;
        p.y += sin(uTime*0.18 + aSeed*0.7) * 0.3 + mod(uTime*0.15 + aSeed, 6.0) * 0.25 - 0.8;
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        // Larger when caught in the sun-cone
        float catchLight = smoothstep(3.0, 0.5, length(p.xy - vec2(0.3, 1.2)));
        gl_PointSize = (1.2 + catchLight * 2.8) * (uPixel / 900.0);
        vAlpha = 0.25 + catchLight * 0.7;
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        float a = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(vec3(1.00, 0.88, 0.66), a * vAlpha);
      }
    `,
  });
  const motes = new THREE.Points(moteGeo, moteMat);
  motes.renderOrder = 3;
  scene.add(motes);



  const clock = new THREE.Clock();

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    bgMat.uniforms.uAspect.value    = w / h;
    raysMat.uniforms.uAspect.value  = w / h;
    beamsMat.uniforms.uAspect.value = w / h;
    moteMat.uniforms.uPixel.value   = h;
  }
  window.addEventListener('resize', resize);

  function animate() {
    const t = clock.getElapsedTime();
    bgMat.uniforms.uTime.value      = t;
    glowMat.uniforms.uTime.value    = t;
    raysMat.uniforms.uTime.value    = t;
    beamsMat.uniforms.uTime.value   = t;
    moteMat.uniforms.uTime.value    = t;

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  // ---------- Enter / exit ----------
  // Double-rAF ensures the browser has committed the initial opacity:1 state
  // before we add .lifted — without this, the transition silently fires on the
  // same frame as the initial render and the veil appears already transparent.
  // Delay reveal 1.2 s so the ambient sound establishes before any light appears.
  // The ease-in-out curve starts imperceptibly slow, so the scene seeps in
  // rather than jumping in.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setTimeout(() => {
      veilEl.classList.add('lifted');
      setTimeout(() => captionEl.classList.add('in'), 2400);
      setTimeout(() => exitEl.classList.add('ready'), 3800);
    }, 1200);
  }));

  function returnToField() {
    veilEl.classList.remove('lifted');
    veilEl.classList.add('closing');
    captionEl.classList.remove('in');
    // Flag so the Word Field skips the intro when we come back
    sessionStorage.setItem('understory:returning', '1');
    // Crossfade audio down
    if (window.__komorebiAudio) window.__komorebiAudio.fadeOut(1.4);
    setTimeout(() => { location.href = '../'; }, 1800);
  }
  exitEl.addEventListener('click', returnToField);
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') returnToField();
  });

  // ---------- Sound: leaves + wind + occasional distant bird ----------
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.value = 0;
  master.connect(audioCtx.destination);

  // Pink-ish noise buffer
  function makeNoise(seconds, gainMul = 1) {
    const len = seconds * audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0;
    for (let i=0;i<len;i++) {
      const w = Math.random()*2-1;
      b0 = 0.99765*b0 + w*0.0990460;
      b1 = 0.96300*b1 + w*0.2965164;
      b2 = 0.57000*b2 + w*1.0526913;
      d[i] = (b0+b1+b2 + w*0.1848) * 0.08 * gainMul;
    }
    return buf;
  }

  // (1) Leaf-rustle layer: mid-high filtered noise modulated by wind
  const leafSrc = audioCtx.createBufferSource();
  leafSrc.buffer = makeNoise(3);
  leafSrc.loop = true;
  const leafBP = audioCtx.createBiquadFilter();
  leafBP.type = 'bandpass';
  leafBP.frequency.value = 2400;
  leafBP.Q.value = 0.6;
  const leafGain = audioCtx.createGain();
  leafGain.gain.value = 0.14;
  leafSrc.connect(leafBP).connect(leafGain).connect(master);
  leafSrc.start();

  // LFO for leaf "gusts"
  const gustOsc = audioCtx.createOscillator();
  gustOsc.frequency.value = 0.12;
  const gustAmt = audioCtx.createGain();
  gustAmt.gain.value = 0.10;
  gustOsc.connect(gustAmt).connect(leafGain.gain);
  gustOsc.start();

  // (2) Distant air: low-passed noise, very slow filter sweep
  const airSrc = audioCtx.createBufferSource();
  airSrc.buffer = makeNoise(3, 1.2);
  airSrc.loop = true;
  const airLP = audioCtx.createBiquadFilter();
  airLP.type = 'lowpass';
  airLP.frequency.value = 380;
  const airGain = audioCtx.createGain();
  airGain.gain.value = 0.22;
  airSrc.connect(airLP).connect(airGain).connect(master);
  airSrc.start();

  const sweep = audioCtx.createOscillator();
  sweep.frequency.value = 0.02;
  const sweepAmt = audioCtx.createGain();
  sweepAmt.gain.value = 120;
  sweep.connect(sweepAmt).connect(airLP.frequency);
  sweep.start();

  // (3) Occasional distant bird — a short tone with vibrato, every 25–60s
  function chirp() {
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    const base = 1400 + Math.random() * 900;
    o.frequency.setValueAtTime(base, now);
    o.frequency.exponentialRampToValueAtTime(base * 1.25, now + 0.08);
    o.frequency.exponentialRampToValueAtTime(base * 0.9,  now + 0.22);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.06, now + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
    // Reverb-ish tail via a lowpass
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 3000;
    o.connect(lp).connect(g).connect(master);
    o.start(now);
    o.stop(now + 0.4);
    setTimeout(chirp, 25000 + Math.random() * 35000);
  }
  setTimeout(chirp, 6000 + Math.random() * 10000);

  // Fade in
  const t0 = audioCtx.currentTime;
  master.gain.setValueAtTime(0, t0);
  master.gain.linearRampToValueAtTime(0.7, t0 + 3.2);

  window.__komorebiAudio = {
    fadeOut(sec = 1.4) {
      const n = audioCtx.currentTime;
      master.gain.cancelScheduledValues(n);
      master.gain.setValueAtTime(master.gain.value, n);
      master.gain.linearRampToValueAtTime(0, n + sec);
    }
  };

})();
</script>
