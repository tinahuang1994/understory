<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Understory — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300&family=Noto+Serif+KR:wght@300&family=Noto+Serif+Devanagari:wght@300&family=Noto+Naskh+Arabic:wght@400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #050604;
    color: #f5f0e8;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .veil {
    position: fixed; inset: 0;
    background: #000;
    pointer-events: none;
    opacity: 1;
    transition: opacity 2.2s cubic-bezier(.22,.61,.36,1);
    z-index: 20;
  }
  .veil.lifted { opacity: 0; }
  .veil.closing { opacity: 1; transition: opacity 1.4s ease; }

  /* centred word + label */
  .centre {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
  }
  .centre.in { opacity: 1; }

  .word-script {
    font-weight: 300;
    font-size: 72px;
    letter-spacing: 0.04em;
    color: rgba(245, 240, 232, 0.22);
    line-height: 1;
  }
  .word-roman {
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.10em;
    color: rgba(245, 240, 232, 0.14);
  }
  .coming-soon {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: rgba(245, 240, 232, 0.35);
    margin-top: 16px;
  }

  /* return button */
  .exit {
    position: fixed;
    top: 24px; left: 28px;
    z-index: 15;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: rgba(245, 236, 216, 0.55);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.6s ease 1s, color 0.4s ease;
  }
  .exit.ready { opacity: 1; }
  .exit:hover { color: rgba(245, 236, 216, 0.95); }
</style>
</head>
<body>

<div class="centre" id="centre">
  <div class="word-script" id="wordScript"></div>
  <div class="word-roman" id="wordRoman"></div>
  <div class="coming-soon">Coming soon</div>
</div>

<button class="exit" id="exit" aria-label="Return to the field">
  <span>←</span><span>return</span>
</button>

<div class="veil" id="veil"></div>

<script>
  // Read word data from URL params
  const params  = new URLSearchParams(location.search);
  const script  = params.get('script') || '';
  const roman   = params.get('roman')  || '';
  const lang    = params.get('lang')   || '';

  document.getElementById('wordScript').textContent = script;
  document.getElementById('wordRoman').textContent  = roman ? roman : '';
  // Hide roman line if it's a Latin-script word (roman == script)
  if (roman === script) document.getElementById('wordRoman').style.display = 'none';
  document.title = script ? `Understory — ${roman}` : 'Understory — Coming Soon';

  const veilEl   = document.getElementById('veil');
  const centreEl = document.getElementById('centre');
  const exitEl   = document.getElementById('exit');

  // Reveal
  requestAnimationFrame(() => requestAnimationFrame(() => {
    veilEl.classList.add('lifted');
    setTimeout(() => centreEl.classList.add('in'),   900);
    setTimeout(() => exitEl.classList.add('ready'), 1800);
  }));

  // Return
  function returnToField() {
    veilEl.classList.remove('lifted');
    veilEl.classList.add('closing');
    centreEl.classList.remove('in');
    sessionStorage.setItem('understory:returning', '1');
    setTimeout(() => { location.href = '../'; }, 1500);
  }
  exitEl.addEventListener('click', returnToField);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') returnToField(); });
</script>
</body>
</html>
